name: Build AstraLauncher

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - run: uv sync --all-packages
      - run: uv pip install pyinstaller
      - run: uv run python .github/scripts/freeze_versions.py

      - name: Build
        shell: bash
        run: |
          FLAGS="--noconfirm --windowed --optimize 2 --exclude-module PyQt5 --exclude-module PyQt6 --exclude-module PySide6 --exclude-module numpy --exclude-module pandas --exclude-module matplotlib --exclude-module pytest --hidden-import customtkinter --collect-all customtkinter --hidden-import ttkbootstrap_icons --collect-all ttkbootstrap_icons --hidden-import ttkbootstrap_icons_lucide --collect-all ttkbootstrap_icons_lucide --paths packages/core/src --paths packages/desktop/src packages/desktop/src/desktop/app.py"
          
          if [ "${{ matrix.os }}" == "windows-latest" ]; then
            uv run pyinstaller $FLAGS --onefile --name AstraLauncher-DEV-Windows
            uv run pyinstaller $FLAGS --onedir --name AstraLauncher-RELEASE-Windows
          else
            uv run pyinstaller $FLAGS --onedir --name AstraLauncher-RELEASE-${{ runner.os }}
          fi

      - name: Create Installers
        shell: bash
        run: |
          VERSION=$(uv run python -c "import tomllib; print(tomllib.load(open('packages/desktop/pyproject.toml', 'rb'))['project']['version'])")
          
          if [ "${{ matrix.os }}" == "macos-latest" ]; then
            brew install create-dmg
            create-dmg --volname "Astra Launcher" --window-pos 200 120 --window-size 600 400 --icon-size 100 --icon "AstraLauncher-RELEASE-macos-latest.app" 175 120 --hide-extension "AstraLauncher-RELEASE-macos-latest.app" --app-drop-link 425 120 "AstraLauncher-RELEASE-macOS-${VERSION}.dmg" "dist/AstraLauncher-RELEASE-macos-latest.app"
          
          elif [ "${{ matrix.os }}" == "windows-latest" ]; then
            @"
            [Setup]
            AppName=Astra Launcher
            AppVersion=${VERSION}
            DefaultDirName={autopf}\AstraLauncher
            OutputDir=.
            OutputBaseFilename=AstraLauncher-Installer-Windows-${VERSION}
            Compression=lzma
            SolidCompression=yes
            [Files]
            Source: "dist\AstraLauncher-RELEASE-Windows\*"; DestDir: "{app}"; Flags: ignoreversion recursesubdirs createallsubdirs
            [Icons]
            Name: "{autoprograms}\Astra Launcher"; Filename: "{app}\AstraLauncher-RELEASE-Windows.exe"
            Name: "{autodesktop}\Astra Launcher"; Filename: "{app}\AstraLauncher-RELEASE-Windows.exe"
            "@ > setup.iss
            iscc setup.iss
          
          elif [ "${{ matrix.os }}" == "ubuntu-latest" ]; then
            tar -czvf AstraLauncher-RELEASE-Linux-${VERSION}.tar.gz -C dist AstraLauncher-RELEASE-ubuntu-latest
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: AstraLauncher-Build-${{ runner.os }}
          path: |
            dist/AstraLauncher-DEV-Windows.exe
            *.dmg
            *.tar.gz
            *.exe
